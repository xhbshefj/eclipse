<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose a subject, i-Ready</title>
  <link rel="icon" type="i/x-icon" href="/images/favicon.png">
  <link href="https://googleapis.com" rel="stylesheet">
  <script defer src="https://vercel-insights.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #ccc;
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.6rem 1.5rem;
      background: rgba(8, 8, 12, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
      z-index: 10;
      position: relative;
    }

    .nav-logo {
      position: absolute;
      left: 1.25rem;
      font-family: 'Parkinsans', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: #fff;
      letter-spacing: -0.01em;
      pointer-events: none;
    }

    nav button {
      background: transparent;
      border: none;
      color: #555;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      border-radius: 999px;
      transition: background 0.15s, color 0.15s;
    }

    nav button:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #bbb;
    }

    nav button.active {
      background: rgba(88, 88, 195, 0.2);
      color: #a0a0ff;
    }
  </style>
</head>
<body>

  <iframe id="frame" src="/home.html" name="main"></iframe>

  <nav>
    <div class="nav-logo">
    eclipse
    </div>

  
    <button id="btn-home" class="active" onclick="loadPage('/home.html', this)">home</button>
    <button id="btn-games" onclick="loadPage('/games/index.html', this)">games</button>
    <button id="btn-links" onclick="loadPage('/links.html', this)">links</button>
  </nav>

  <script>
    function loadPage(url, btn) {
      const frame = document.getElementById('frame');
      
      frame.src = url;
      
      document.querySelectorAll('nav button').forEach(button => {
        button.classList.remove('active');
      });

      btn.classList.add('active');
    }
  </script>
</body>
</html>
