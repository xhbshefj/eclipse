<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eclipse — Games</title>
  <link rel="icon" type="i/x-icon" href="/images/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      color: #ccc;
      font-family: monospace;
      min-height: 100vh;
      overflow-y: auto;
  
    }

    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1; 
    }

    .search-container {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 1.5rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
    }

    #gameSearch {
      padding: 12px 24px;
      width: 320px;
      border-radius: 30px;
      border: 1px solid #5858c3;
      background: #111;
      color: #fff;
      font-family: monospace;
      outline: none;
    }

    .grid {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem;
      justify-content: center;
    }

    .grid a {
      display: block;
      border: 1px solid #222;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      border-radius: 30px;
    }

    .grid a:hover {
      border-color: #5858c3;
      transform: scale(1.03);
    }

    .grid img {
      display: block;
      height: 180px;
      width: auto;
      border-radius: 30px;
    }

    #noResults {
      display: none;
      text-align: center;
      padding: 2rem;
      font-size: 1.2rem;
      color: #5858c3;
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div class="search-container">
    <input type="text" id="gameSearch" placeholder="Search for a game..." onkeyup="filterGames()">
  </div>

  <div id="noResults">sorry we don't have that one</div>

  <div class="grid" id="gameGrid">
games go here
  </div>

  <script src="https://cloudflare.com"></script>

  <script src="https://jsdelivr.net"></script>
  
  <script>   window.addEventListener('DOMContentLoaded', () => {
      if (typeof VANTA !== 'undefined') {
    });

    function filterGames() {
      const input = document.getElementById('gameSearch').value.toLowerCase();
      const links = document.querySelectorAll('.grid a');
      const noResults = document.getElementById('noResults');
      let foundAny = false;
      
      links.forEach(link => {
        const title = link.querySelector('img').alt.toLowerCase();
        if (title.includes(input)) {
          link.style.display = "block";
          foundAny = true;
        } else {
          link.style.display = "none";
        }
      });
      noResults.style.display = foundAny ? "none" : "block";
    }

    document.querySelectorAll('.grid a').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        location.href = '/iframe.html?url=' + encodeURIComponent(a.href);
      });
    });
  </script>
</body>
</html>
